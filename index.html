<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>JSON 格式化</title>

<style>
body {
  font-family: Arial;
  margin: 20px;
}

textarea {
  width: 100%;
  height: 180px;
  font-family: monospace;
}

button {
  margin-top: 10px;
  margin-right: 10px;
  padding: 6px 12px;
}

#output {
  background: #111;
  color: #0f0;
  padding: 10px;
  white-space: pre-wrap;
  min-height: 150px;
}

.error {
  color: red;
}
</style>

</head>
<body>

<h2>JSON 格式化</h2>

<textarea id="input">
{
  "test": "123"
}
</textarea>

<br>

<button onclick="formatJson()">格式化</button>
<button onclick="send()">送出</button>
<button onclick="copy()">複製結果</button>

<p id="status"></p>

<h3>結果</h3>
<pre id="output"></pre>

<script>

const webhookUrl = "https://format-conversion.vercel.app/api/clean";

// ✅ 格式化 JSON
function formatJson() {
  const input = document.getElementById('input');
  try {
    const obj = JSON.parse(input.value);
    input.value = JSON.stringify(obj, null, 2);
    setStatus("格式化成功", false);
  } catch (e) {
    setStatus("JSON格式錯誤", true);
  }
}

// ✅ 顯示狀態
function setStatus(msg, isError) {
  const el = document.getElementById('status');
  el.innerText = msg;
  el.className = isError ? "error" : "";
}

// ✅ 發送到 n8n
async function send() {
  const input = document.getElementById('input').value;
  const output = document.getElementById('output');

  let json;
  try {
    json = JSON.parse(input);
  } catch (e) {
    setStatus("JSON格式錯誤", true);
    return;
  }

  setStatus("處理中...", false);
  output.innerText = "Loading...";

  try {
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 15000);

    const res = await fetch(webhookUrl, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'cb557d70-6b1d-4402-ae1e-e62e5010bfd8'
      },
      body: JSON.stringify(json),
      mode: 'cors',
      signal: controller.signal
    });

    clearTimeout(timeoutId);

    if (!res.ok) throw new Error("HTTP錯誤: " + res.status);

    const data = await res.json();
    output.innerText = JSON.stringify(data, null, 2);
    setStatus("完成 ✅", false);

  } catch (err) {
    output.innerText = err.message;
    setStatus("發生錯誤 ❌", true);
  }
}

// ✅ 複製結果
function copy() {
  const text = document.getElementById('output').innerText;

  if (!text) {
    setStatus("沒有可複製內容", true);
    return;
  }

  navigator.clipboard.writeText(text);
  setStatus("已複製 ✅", false);
}

</script>

</body>
</html>
